# kitty-worktree: Per-repo session config
#
# Place this file as .kitty-worktree.toml in your repo root.
# It takes priority over the centralized ~/.config/kitty/worktree.toml.
#
# Template variables: {branch}, {repo}, {path}, {basename}

# Option 1: Reference a kitty session .conf file (recommended for shell initialization)
# session_file = "~/.config/kitty/sessions/myproject.conf"

# Option 2: Define panes inline
tab_title = "Backend ({branch})"

[[panes]]
title = "editor"
command = "nvim"

[[panes]]
title = "tests"
location = "hsplit"

[[panes]]
title = "server"
location = "vsplit"
